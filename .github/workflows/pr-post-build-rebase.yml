name: pr-post-build-rebase

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]

permissions:
  contents: write
  pull-requests: read
  checks: read
  statuses: read

jobs:
  verify-and-rebase:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.pull_requests[0] != null
    concurrency:
      group: pr-post-build-rebase-${{ github.event.workflow_run.pull_requests[0].number }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - name: Resolve triggering PR
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.workflow_run.pull_requests[0];
            if (!pr) {
              core.setFailed('No pull request associated with workflow_run.');
              return;
            }

            const { owner, repo } = context.repo;
            const prResp = await github.rest.pulls.get({ owner, repo, pull_number: pr.number });
            const data = prResp.data;

            core.setOutput('number', String(data.number));
            core.setOutput('head_ref', data.head.ref);
            core.setOutput('head_repo', data.head.repo.full_name);
            core.setOutput('base_ref', data.base.ref);
            core.setOutput('sha', data.head.sha);

      - name: Ensure PR targets main
        if: steps.pr.outputs.base_ref != 'main'
        run: |
          echo "PR #${{ steps.pr.outputs.number }} targets '${{ steps.pr.outputs.base_ref }}', not 'main'. Skipping rebase."

      - name: Ensure PR branch is in this repository
        if: steps.pr.outputs.base_ref == 'main' && steps.pr.outputs.head_repo != github.repository
        run: |
          echo "PR branch is from '${{ steps.pr.outputs.head_repo }}' (fork/external). Skipping rebase."

      - name: Verify all checks on PR head are green
        if: steps.pr.outputs.base_ref == 'main' && steps.pr.outputs.head_repo == github.repository
        id: checks
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = '${{ steps.pr.outputs.sha }}';

            const checks = await github.paginate(github.rest.checks.listForRef, {
              owner,
              repo,
              ref: sha,
              per_page: 100,
            });

            const nonGreenChecks = checks.filter((check) => {
              return check.status !== 'completed' || !['success', 'neutral', 'skipped'].includes(check.conclusion || '');
            });

            const statusResp = await github.rest.repos.getCombinedStatusForRef({ owner, repo, ref: sha });
            const statusState = statusResp.data.state;

            if (statusState !== 'success' || nonGreenChecks.length > 0) {
              core.setFailed(
                `PR head ${sha} is not fully green. status=${statusState}, non-green checks=${nonGreenChecks.map((c) => c.name).join(', ')}`
              );
              return;
            }

            core.info(`All checks are green for ${sha}.`);

      - name: Checkout PR branch
        if: steps.pr.outputs.base_ref == 'main' && steps.pr.outputs.head_repo == github.repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0

      - name: Rebase PR branch onto main
        if: steps.pr.outputs.base_ref == 'main' && steps.pr.outputs.head_repo == github.repository
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git rebase origin/main
          git push --force-with-lease origin HEAD:${{ steps.pr.outputs.head_ref }}
